<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080d14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>感應影音牆</title>
    <meta name="description" content="放置感應板塊，即刻欣賞專屬影片。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">INTERACTIVE EXPERIENCE</p>
          <h1>感應影音牆</h1>
        </div>
        <div class="connection" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="connectionText">系統連線中</span>
        </div>
      </header>

      <section class="tutorial" aria-labelledby="tutorialHeading">
        <div class="tutorial-intro">
          <p class="eyebrow">HOW TO EXPERIENCE</p>
          <h2 id="tutorialHeading">放上板塊，影片即刻播放</h2>
        </div>

        <ol class="steps">
          <li>
            <span>1</span>
            <div><strong>選一塊</strong><small>一次選擇一塊板塊</small></div>
          </li>
          <li>
            <span>2</span>
            <div><strong>平放感應區</strong><small>讓板塊完整貼合</small></div>
          </li>
          <li>
            <span>3</span>
            <div><strong>欣賞影片</strong><small>影片將自動開始播放</small></div>
          </li>
        </ol>

        <p class="tutorial-note">若影片沒有開始，請將板塊拿起後重新平放。</p>
      </section>

      <section class="stage" aria-label="影片播放區">
        <video
          id="mainVideo"
          playsinline
          muted
          loop
          preload="auto"
          aria-label="目前播放影片"
        ></video>

        <div class="idle-state">
          <div class="tile-mark" aria-hidden="true"><i></i></div>
          <p>請放置感應板塊</p>
          <span>影片將自動播放</span>
        </div>

        <div class="stage-meta">
          <div>
            <span>NOW PLAYING</span>
            <strong id="nowPlaying">等待體驗</strong>
          </div>
        </div>
      </section>
    </main>

    <noscript>此體驗需要啟用 JavaScript。</noscript>
    <script src="vendor/mqtt.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
